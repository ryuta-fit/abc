<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人体解剖 3D ビューア</title>
  <meta name="description" content="Three.js で動く、人体の構造を学ぶインタラクティブ 3D モデル。骨格・内臓・筋肉・皮膚を切り替えて学べます。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <header class="topbar">
    <h1 class="title">人体解剖 <span>3D ビューア</span></h1>
    <p class="subtitle">ドラッグで回転 / ホイールでズーム / パーツをクリックで詳細表示</p>
  </header>

  <main class="layout">
    <!-- 左: レイヤーパネル -->
    <aside class="panel panel-left" aria-label="レイヤー切替">
      <section class="panel-section">
        <h2>表示レイヤー</h2>
        <label class="toggle"><input type="checkbox" id="toggle-skin"      checked> <span class="dot skin"></span> 皮膚</label>
        <label class="toggle"><input type="checkbox" id="toggle-muscle"    checked> <span class="dot muscle"></span> 筋肉</label>
        <label class="toggle"><input type="checkbox" id="toggle-skeleton"  checked> <span class="dot skeleton"></span> 骨格</label>
        <label class="toggle"><input type="checkbox" id="toggle-organ"     checked> <span class="dot organ"></span> 内臓</label>
      </section>

      <section class="panel-section">
        <h2>皮膚の不透明度</h2>
        <input type="range" id="skin-opacity" min="0" max="100" value="22">
      </section>

      <section class="panel-section">
        <h2>オプション</h2>
        <label class="toggle"><input type="checkbox" id="toggle-labels"> <span>部位ラベルを表示</span></label>
        <button id="reset-view" class="btn-secondary">視点をリセット</button>
      </section>

      <section class="panel-section legend">
        <h2>凡例</h2>
        <div><span class="dot skeleton"></span> 骨格系</div>
        <div><span class="dot organ"></span> 内臓系</div>
        <div><span class="dot muscle"></span> 筋肉系</div>
      </section>
    </aside>

    <!-- 中央: 3D ビューポート -->
    <section id="viewport" class="viewport" aria-label="3D ビューポート">
      <div id="loading" class="loading">モデルを読み込み中…</div>
    </section>

    <!-- 右: 情報パネル -->
    <aside class="panel panel-right" aria-label="選択部位の情報">
      <div class="info-card">
        <h2 id="info-title">人体を探検しよう</h2>
        <div class="info-meta">
          <span id="info-badge" class="badge" data-system=""></span>
          <span id="info-en" class="en"></span>
        </div>
        <p id="info-desc" class="info-desc"></p>
        <div id="info-hint" class="info-hint">
          <p>表示レイヤーのチェックで骨格・内臓・筋肉・皮膚を切り替えられます。</p>
          <p>モデル上のパーツをクリックすると、ここに日本語名・英語名・役割が表示されます。</p>
          <ul>
            <li>左ドラッグ: 回転</li>
            <li>ホイール / ピンチ: ズーム</li>
            <li>右ドラッグ: 視点移動 (パン)</li>
          </ul>
        </div>
      </div>
    </aside>
  </main>

  <footer class="footer">
    <p>学習用の簡易 3D モデルです。正確な医学的診断には使用しないでください。</p>
  </footer>

  <script type="module" src="./anatomy.js"></script>
</body>
</html>
